<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Website</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #202124;
        background: #f7f7f4;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(90vw, 680px);
        padding: 48px 24px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        max-width: 42rem;
        color: #4d5156;
        font-size: 1.125rem;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>My Website</h1>
      <p>GitHub Pagesで公開するためのシンプルなWebサイトです。</p>
    </main>
  </body>
</html>
